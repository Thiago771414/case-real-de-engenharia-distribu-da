global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: "worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: "outbox-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9200"]
