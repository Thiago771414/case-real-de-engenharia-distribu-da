services:
  postgres:
    image: postgres:16-alpine
    container_name: minishop-postgres
    environment:
      POSTGRES_USER: minishop
      POSTGRES_PASSWORD: minishop
      POSTGRES_DB: minishop
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minishop -d minishop"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - minishop

  redis:
    image: redis:7-alpine
    container_name: minishop-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - minishop

  kafka:
    image: redpandadata/redpanda:latest
    container_name: minishop-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    healthcheck:
      # Evita grep; usa o próprio rpk pra checar se o broker responde
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - minishop

  kafka-ui:
    image: redpandadata/console:latest
    container_name: minishop-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      # Redpanda Console (Kafka API)
      KAFKA_BROKERS: "kafka:9092"
    networks:
      - minishop

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: minishop-jaeger
    ports:
      - "16686:16686"   # UI
      - "14250:14250"   # gRPC collector (usado pelo otel-collector)
    restart: unless-stopped
    networks:
      - minishop

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: minishop-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - "4318:4318"     # OTLP HTTP
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped
    networks:
      - minishop
  
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: minishop-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - minishop

  grafana:
    image: grafana/grafana:10.3.1
    container_name: minishop-grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks:
      - minishop

networks:
  minishop:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  kafka_data:
